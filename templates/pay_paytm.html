<!-- pay_paytm.html -->
{% extends "base.html" %}
{% block title %}Pay with Paytm{% endblock %}
{% block content %}
<section class="container" style="max-width:720px;padding:1rem;">
  <h2>Complete Payment</h2>
  <p>Order <strong>{{ order_id }}</strong> • Amount <strong>₹{{ amount }}</strong></p>

  <div id="paytm-checkoutjs"></div>

  <script
    type="application/javascript"
    crossorigin="anonymous"
    src="{{ host }}/merchantpgpui/checkoutjs/merchants/{{ mid }}.js"
    onload="onScriptLoad()"></script>

  <script>
    async function onScriptLoad(){
      // fetch txnToken from server
      const res = await fetch("{{ url_for('paytm_initiate') }}", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          orderId: "{{ order_id }}",
          amount: "{{ amount }}",
          custId: "{{ cust_id }}"
        })
      });
      const {txnToken, error} = await res.json();
      if(!txnToken){ alert("Init failed"); console.log(error); return; }

      const config = {
        root: "", flow: "DEFAULT",
        data: {
          orderId: "{{ order_id }}",
          token: txnToken,
          tokenType: "TXN_TOKEN",
          amount: "{{ amount }}"
        },
        handler: {
          notifyMerchant: function (eventName, data) {
            // optional; response can be handled here if redirect=false is used
            console.log("event:", eventName, data);
          }
        }
      };

      if (window.Paytm && window.Paytm.CheckoutJS){
        window.Paytm.CheckoutJS.onLoad(function(){
          window.Paytm.CheckoutJS.init(config).then(function(){
            window.Paytm.CheckoutJS.invoke();
          }).catch(function(err){ console.error("init error:", err); });
        });
      }
    }
  </script>
</section>
{% endblock %}
